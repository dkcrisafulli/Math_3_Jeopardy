<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Jeopardy — Grades 3-5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --board-navy: #0B1F6B;
    --board-navy-deep: #060F3D;
    --tile-blue: #142A82;
    --tile-blue-light: #1E3AA8;
    --gold: #FFC72C;
    --gold-deep: #E6A800;
    --white: #F5F7FF;
    --correct: #3FA34D;
    --incorrect: #D64545;
    --ink: #10163A;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 50% -10%, var(--tile-blue-light) 0%, var(--board-navy) 45%, var(--board-navy-deep) 100%);
    font-family: 'Nunito', sans-serif;
    color: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 60px;
  }

  h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(26px, 5vw, 42px);
    letter-spacing: 1px;
    margin: 4px 0 2px;
    text-align: center;
    color: var(--gold);
    text-shadow: 0 3px 0 rgba(0,0,0,0.35);
  }

  .subtitle {
    font-size: 15px;
    color: rgba(245,247,255,0.75);
    margin-bottom: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Scoreboard */
  .scoreboard {
    display: flex;
    gap: 18px;
    margin-bottom: 26px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .team {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,199,44,0.25);
    border-radius: 10px;
    padding: 10px 18px;
    text-align: center;
    min-width: 140px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .team.active {
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(255,199,44,0.25);
  }
  .team-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 13px;
    letter-spacing: 0.5px;
    color: var(--gold);
    text-transform: uppercase;
  }
  .team-score {
    font-family: 'Anton', sans-serif;
    font-size: 30px;
    margin-top: 2px;
  }
  .team-hint {
    font-size: 11px;
    color: rgba(245,247,255,0.55);
    margin-top: 2px;
  }

  /* Board */
  .board {
    width: min(920px, 96vw);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    perspective: 1200px;
  }

  .category-header {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(11px, 2vw, 15px);
    text-align: center;
    color: var(--white);
    background: linear-gradient(180deg, var(--tile-blue-light), var(--tile-blue));
    border-radius: 8px;
    padding: 12px 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.25;
    box-shadow: inset 0 0 0 1px rgba(255,199,44,0.3);
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tile {
    aspect-ratio: 3 / 2;
    background: linear-gradient(180deg, var(--tile-blue), var(--board-navy));
    border-radius: 8px;
    box-shadow: inset 0 0 0 1px rgba(255,199,44,0.3), 0 4px 10px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.2,0.8,0.3,1);
  }
  .tile:hover:not(.used) {
    transform: translateY(-3px) scale(1.02);
    box-shadow: inset 0 0 0 1px var(--gold), 0 8px 18px rgba(255,199,44,0.2);
  }
  .tile .value {
    font-family: 'Anton', sans-serif;
    font-size: clamp(20px, 4vw, 32px);
    color: var(--gold);
    text-shadow: 0 2px 0 rgba(0,0,0,0.4);
  }
  .tile.used {
    background: rgba(255,255,255,0.03);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    cursor: default;
  }
  .tile.used .value { opacity: 0; }

  /* Overlay / question modal */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(4, 8, 30, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 30;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  .qcard {
    width: min(620px, 94vw);
    background: linear-gradient(180deg, var(--tile-blue-light), var(--board-navy-deep));
    border-radius: 14px;
    border: 2px solid var(--gold);
    padding: 30px 26px 26px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.55);
    transform: scale(0.92);
    opacity: 0;
    transition: transform 0.3s cubic-bezier(0.2,0.9,0.3,1.15), opacity 0.25s ease;
  }
  .overlay.show .qcard { transform: scale(1); opacity: 1; }

  .qcard .meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }
  .qcard .cat-tag {
    font-family: 'Archivo Black', sans-serif;
    font-size: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--gold);
  }
  .qcard .val-tag {
    font-family: 'Anton', sans-serif;
    font-size: 22px;
    color: var(--gold);
  }

  .qcard .question {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 21px;
    line-height: 1.4;
    margin-bottom: 20px;
    color: var(--white);
  }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 480px) {
    .options { grid-template-columns: 1fr; }
  }

  .opt {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 15px;
    text-align: left;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--gold);
    background: rgba(255,199,44,0.12);
  }
  .opt:disabled { cursor: default; }
  .opt.correct {
    background: rgba(63,163,77,0.25);
    border-color: var(--correct);
  }
  .opt.incorrect {
    background: rgba(214,69,69,0.25);
    border-color: var(--incorrect);
  }

  .feedback {
    margin-top: 16px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 15px;
    letter-spacing: 0.3px;
    min-height: 22px;
  }
  .feedback.correct { color: #6FE083; }
  .feedback.incorrect { color: #FF8A8A; }

  .qcard .continue-btn {
    margin-top: 20px;
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: var(--gold);
    color: var(--ink);
    font-family: 'Archivo Black', sans-serif;
    font-size: 15px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .qcard .continue-btn.show { opacity: 1; pointer-events: auto; }

  .reset-wrap {
    margin-top: 26px;
  }
  .reset-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: rgba(245,247,255,0.7);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
  }
  .reset-btn:hover { border-color: var(--gold); color: var(--gold); }

  @media (prefers-reduced-motion: reduce) {
    .tile, .qcard, .overlay { transition: none; }
  }
</style>
</head>
<body>

  <div class="subtitle">Grades 3–5 · Math Review</div>
  <h1>Math Jeopardy</h1>

  <div class="scoreboard">
    <div class="team active" id="teamA" onclick="setActiveTeam('A')">
      <div class="team-name">Team A</div>
      <div class="team-score" id="scoreA">0</div>
      <div class="team-hint">tap to select</div>
    </div>
    <div class="team" id="teamB" onclick="setActiveTeam('B')">
      <div class="team-name">Team B</div>
      <div class="team-score" id="scoreB">0</div>
      <div class="team-hint">tap to select</div>
    </div>
  </div>

  <div class="board" id="board"></div>

  <div class="reset-wrap">
    <button class="reset-btn" id="resetBtn">Reset Board</button>
  </div>

  <div class="overlay" id="overlay">
    <div class="qcard">
      <div class="meta">
        <div class="cat-tag" id="catTag"></div>
        <div class="val-tag" id="valTag"></div>
      </div>
      <div class="question" id="questionText"></div>
      <div class="options" id="optionsWrap"></div>
      <div class="feedback" id="feedback"></div>
      <button class="continue-btn" id="continueBtn">Back to Board</button>
    </div>
  </div>

<script>
  const CATEGORIES = [
    {
      name: "Multiplication & Division",
      questions: [
        {
          value: 100,
          q: "What is 6 × 7?",
          options: ["42", "36", "48", "13"],
          correct: 0
        },
        {
          value: 200,
          q: "What is 84 ÷ 7?",
          options: ["11", "12", "14", "9"],
          correct: 1
        },
        {
          value: 300,
          q: "A number that divides evenly into another number, with nothing left over, is called a:",
          options: ["Multiple", "Product", "Factor", "Quotient"],
          correct: 2
        },
        {
          value: 400,
          q: "Which expression correctly represents 8 groups of 5?",
          options: ["8 + 5", "5 ÷ 8", "8 × 5", "8 − 5"],
          correct: 2
        }
      ]
    },
    {
      name: "Fractions",
      questions: [
        {
          value: 100,
          q: "Which fraction represents 3 out of 4 equal parts?",
          options: ["4/3", "3/4", "1/4", "3/3"],
          correct: 1
        },
        {
          value: 200,
          q: "Which fraction is equivalent to 1/2?",
          options: ["2/6", "3/8", "4/8", "1/3"],
          correct: 2
        },
        {
          value: 300,
          q: "Which is greater: 2/3 or 3/5?",
          options: ["2/3", "3/5", "They are equal", "Cannot be compared"],
          correct: 0
        },
        {
          value: 400,
          q: "What is 1/4 + 1/4?",
          options: ["2/8", "1/2", "2/4 only, not simplified", "1/8"],
          correct: 1
        }
      ]
    },
    {
      name: "Place Value & Rounding",
      questions: [
        {
          value: 100,
          q: "What is the value of the 5 in 5,432?",
          options: ["5", "50", "500", "5,000"],
          correct: 3
        },
        {
          value: 200,
          q: "Round 486 to the nearest hundred.",
          options: ["400", "490", "500", "480"],
          correct: 2
        },
        {
          value: 300,
          q: "What number is 3,000 + 400 + 20 + 6 written in standard form?",
          options: ["3,426", "3,246", "3,000,426", "3,42,6"],
          correct: 0
        },
        {
          value: 400,
          q: "Round 45,678 to the nearest thousand.",
          options: ["45,000", "45,700", "46,000", "45,680"],
          correct: 2
        }
      ]
    },
    {
      name: "Geometry & Measurement",
      questions: [
        {
          value: 100,
          q: "How many sides does a hexagon have?",
          options: ["5", "6", "7", "8"],
          correct: 1
        },
        {
          value: 200,
          q: "What is the perimeter of a square with side length 5 cm?",
          options: ["10 cm", "20 cm", "25 cm", "15 cm"],
          correct: 1
        },
        {
          value: 300,
          q: "Which angle measures exactly 90 degrees?",
          options: ["Acute angle", "Obtuse angle", "Right angle", "Straight angle"],
          correct: 2
        },
        {
          value: 400,
          q: "What is the area of a rectangle that is 6 cm by 4 cm?",
          options: ["20 cm²", "24 cm²", "10 cm²", "26 cm²"],
          correct: 1
        }
      ]
    }
  ];

  let activeTeam = 'A';
  let scores = { A: 0, B: 0 };
  let currentTile = null;

  function setActiveTeam(team) {
    activeTeam = team;
    document.getElementById('teamA').classList.toggle('active', team === 'A');
    document.getElementById('teamB').classList.toggle('active', team === 'B');
  }

  function renderBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';

    CATEGORIES.forEach(cat => {
      const header = document.createElement('div');
      header.className = 'category-header';
      header.textContent = cat.name;
      board.appendChild(header);
    });

    for (let row = 0; row < 4; row++) {
      CATEGORIES.forEach((cat, catIndex) => {
        const q = cat.questions[row];
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.id = `tile-${catIndex}-${row}`;
        tile.innerHTML = `<div class="value">$${q.value}</div>`;
        tile.addEventListener('click', () => openQuestion(catIndex, row));
        board.appendChild(tile);
      });
    }
  }

  function openQuestion(catIndex, qIndex) {
    const tile = document.getElementById(`tile-${catIndex}-${qIndex}`);
    if (tile.classList.contains('used')) return;

    currentTile = { catIndex, qIndex, tile };
    const cat = CATEGORIES[catIndex];
    const q = cat.questions[qIndex];

    document.getElementById('catTag').textContent = cat.name;
    document.getElementById('valTag').textContent = `$${q.value}`;
    document.getElementById('questionText').textContent = q.q;

    const wrap = document.getElementById('optionsWrap');
    wrap.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.textContent = opt;
      btn.addEventListener('click', () => selectAnswer(i, q));
      wrap.appendChild(btn);
    });

    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('continueBtn').classList.remove('show');

    document.getElementById('overlay').classList.add('show');
  }

  function selectAnswer(selectedIndex, q) {
    const buttons = document.querySelectorAll('.opt');
    buttons.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.correct) btn.classList.add('correct');
      if (i === selectedIndex && selectedIndex !== q.correct) btn.classList.add('incorrect');
    });

    const feedback = document.getElementById('feedback');
    if (selectedIndex === q.correct) {
      feedback.textContent = `Correct! Team ${activeTeam} earns $${q.value}.`;
      feedback.className = 'feedback correct';
      scores[activeTeam] += q.value;
      document.getElementById(`score${activeTeam}`).textContent = scores[activeTeam];
    } else {
      feedback.textContent = `Not quite — the correct answer is highlighted. No points awarded.`;
      feedback.className = 'feedback incorrect';
    }

    document.getElementById('continueBtn').classList.add('show');
  }

  document.getElementById('continueBtn').addEventListener('click', () => {
    if (currentTile) {
      currentTile.tile.classList.add('used');
      currentTile = null;
    }
    document.getElementById('overlay').classList.remove('show');
    setActiveTeam(activeTeam === 'A' ? 'B' : 'A');
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    scores = { A: 0, B: 0 };
    document.getElementById('scoreA').textContent = 0;
    document.getElementById('scoreB').textContent = 0;
    setActiveTeam('A');
    renderBoard();
  });

  renderBoard();
</script>
</body>
</html>
